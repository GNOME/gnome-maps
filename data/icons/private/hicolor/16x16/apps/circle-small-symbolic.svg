<svg
        xmlns='http://www.w3.org/2000/svg'
        xmlns:svg='http://www.w3.org/2000/svg'
        xmlns:rdf='http://www.w3.org/1999/02/22-rdf-syntax-ns#'
        xmlns:cc='http://creativecommons.org/ns#'
        xmlns:dc='http://purl.org/dc/elements/1.1/'
        xmlns:gpa='https://www.gtk.org/grappa'
        gpa:version='1'
        gpa:state-names='outline filled empty'
        gpa:state='0'
        id='svg1'
        width='16'
        height='16'>
  <metadata>
    <rdf:RDF>
      <cc:Work>
        <cc:license
                rdf:resource='https://creativecommons.org/publicdomain/zero/1.0/'/>
        <dc:creator>
          <cc:Agent>
            <dc:title>Jakub Steiner</dc:title>
          </cc:Agent>
        </dc:creator>
        <dc:subject>
          <rdf:Bag>
            <rdf:li>dot point vertex</rdf:li>
          </rdf:Bag>
        </dc:subject>
      </cc:Work>
    </rdf:RDF>
  </metadata>
  <circle
          id='dot'
          style=''
          class='transparent-fill foreground-stroke'
          opacity='1'
          fill='none'
          fill-rule='nonzero'
          stroke='url(#gpa:foreground) rgb(0,0,0)'
          gpa:stroke='foreground'
          stroke-opacity='1'
          stroke-width='2'
          stroke-linecap='round'
          stroke-linejoin='round'
          stroke-miterlimit='4'
          cx='8'
          cy='8'
          r='1'
          gpa:stroke-minwidth='25%'
          gpa:stroke-maxwidth='150%'
          gpa:states='outline filled'>
  </circle>
  <circle
          id='dot'
          style=''
          class='foreground foreground-fill'
          visibility='hidden'
          opacity='1'
          fill='url(#gpa:foreground) rgb(0,0,0)'
          fill-rule='nonzero'
          stroke='none'
          gpa:fill='foreground'
          stroke-opacity='1'
          stroke-width='2'
          stroke-linecap='round'
          stroke-linejoin='round'
          stroke-miterlimit='4'
          gpa:states='filled'
          cx='8'
          cy='8'
          r='1'>
  </circle>
</svg>
